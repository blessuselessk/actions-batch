name: workflow

# Generated by actuated-batch at: {{ .Date }}
# Job requested by {{ .Login }}

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - master
      - main

permissions:
  id-token: write
  contents: read
  checks: read
  actions: read
  issues: read
  packages: write
  pull-requests: read
  repository-projects: read
  statuses: read

env:
  HAS_UPLOADS: 0

jobs:
  workflow:
    name: {{ .Name }}
    runs-on: {{ .RunsOn }}
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
{{- if .Tailscale }}
      - name: Join Tailscale mesh
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:runner
          hostname: runner-${{ github.run_id }}
          version: latest
{{- end }}
      - name: Run the job
        run: |
          echo "HAS_UPLOADS=0" >> $GITHUB_ENV
          nix run {{ .FlakeRef }}

{{if gt (len .Secrets) 0}}
        env:
      {{- range $key, $value := .Secrets }}
          {{ $key }}: {{`${{`}} secrets.{{ $value }} {{`}}`}}
      {{- end }}

{{- end }}

      - name: "Check for uploads"
        run: if [ -d "./uploads" ]; then echo "HAS_UPLOADS=1" >> $GITHUB_ENV ; fi

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        if: {{`${{ env.HAS_UPLOADS == '1'}}`}}
        with:
          if-no-files-found: ignore
          name: uploads
          path: ./uploads/
          retention-days: 1
          compression-level: 1
